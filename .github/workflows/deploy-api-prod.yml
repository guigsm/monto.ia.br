name: Deploy API — Produção

on:
  push:
    branches: [main]
    paths: ['www/api/**']

jobs:
  deploy:
    name: Deploy para api.monto.ia.br
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instala dependências PHP (no runner)
        run: |
          cd www/api
          composer install --no-dev --optimize-autoloader

      - name: Deploy via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.KINGHOST_FTP_HOST }}
          username: ${{ secrets.KINGHOST_FTP_USER }}
          password: ${{ secrets.KINGHOST_FTP_PASS }}
          protocol: ftps
          local-dir: ./www/api/
          server-dir: /api/
          exclude: |
            **/.env
            **/data/tokens.json
            **/data/.token
            **/.gitignore
