name: Validar API PHP — Homologação

# Deploy automático via CI removido.
# A Kinghost bloqueia porta 22 (SSH/SFTP) de IPs externos do GitHub Actions.
# Deploy é feito localmente com SFTP:
#   pip install paramiko
#   python .exec/deploy_sftp.py --env homo

on:
  workflow_dispatch:

jobs:
  validate:
    name: Valida sintaxe PHP
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instala PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Instala dependências
        run: composer install --no-dev --optimize-autoloader --working-dir=www/api

      - name: Valida sintaxe PHP
        run: |
          find www/api/src -name "*.php" -exec php -l {} \;
          find www/api/cli -name "*.php" -exec php -l {} \;
          php -l www/api/index.php
          echo "✓ Sintaxe PHP OK"
