name: Deploy API — Homologação

on:
  push:
    branches: [dev]
    paths: ['www/api/**']

jobs:
  deploy:
    name: Deploy para api-homo.monto.ia.br
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instala PHP e Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Instala dependências PHP
        run: composer install --no-dev --optimize-autoloader --working-dir=www/api

      - name: Instala lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTPS
        env:
          FTP_HOST: ${{ secrets.KINGHOST_FTP_HOST }}
          FTP_USER: ${{ secrets.KINGHOST_FTP_USER }}
          FTP_PASS: ${{ secrets.KINGHOST_FTP_PASS }}
        run: |
          lftp -u "$FTP_USER","$FTP_PASS" "$FTP_HOST" -e "
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:passive-mode true;
            mirror -R --delete --parallel=4 \
              --exclude='^\.env$' \
              --exclude='^data/tokens\.json$' \
              --exclude='^data/\.token$' \
              --exclude='^\.gitignore$' \
              ./www/api/ /api-homo/;
            bye
          "
