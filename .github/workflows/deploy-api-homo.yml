name: Deploy API — Homologação

on:
  push:
    branches: [dev]
    paths: ['www/api/**']

jobs:
  deploy:
    name: Deploy para api-homo.monto.ia.br
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instala PHP e Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Instala dependências PHP
        run: composer install --no-dev --optimize-autoloader --working-dir=www/api

      - name: Deploy via FTP (Python)
        env:
          FTP_HOST: ${{ secrets.KINGHOST_FTP_HOST }}
          FTP_USER: ${{ secrets.KINGHOST_FTP_USER }}
          FTP_PASS: ${{ secrets.KINGHOST_FTP_PASS }}
          DEPLOY_ENV: homo
        run: python .exec/deploy_ftp.py --env homo
